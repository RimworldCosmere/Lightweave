[global]
extends = "../"

[bundles.lightweave_shaders]
description = "Lightweave Shaders"
asset_directory = "./Assets"
output_directory = "./AssetBundles"
bundle_path = "lightweave"
bundle_name = "lightweave_shaders"
filename = "resource_[bundle_name]_shaders_[target]"
include_patterns = ["*.shader"]
targetless = false

[bundles.lightweave_fonts]
description = "Lightweave Fonts"
asset_directory = "./Assets"
output_directory = "./AssetBundles"
bundle_path = "lightweave"
bundle_name = "lightweave_fonts"
filename = "resource_[bundle_name]_fonts"
include_patterns = ["*.ttf"]
